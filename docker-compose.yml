services:
  postgres:
    image: postgres:16-alpine
    container_name: tegeran-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: postgres
      MESSENGER_DB_NAME: ${MESSENGER_DB_NAME}
      MESSENGER_DB_USER: ${MESSENGER_DB_USER}
      MESSENGER_DB_PASSWORD: ${MESSENGER_DB_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: tegeran-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command:
      - start-dev
      - --import-realm
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./infrastructure/keycloak/realm-import:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: tegeran-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${MESSENGER_DB_USER}:${MESSENGER_DB_PASSWORD}@postgres:5432/${MESSENGER_DB_NAME}?schema=public
      PORT: 3000
      AUTH_ENABLED: ${AUTH_ENABLED}
      LOG_LEVEL: ${LOG_LEVEL}
      MOCK_AUTH_SUBJECT: ${MOCK_AUTH_SUBJECT}
      MOCK_USER_NAME: ${MOCK_USER_NAME}
      MOCK_USER_EMAIL: ${MOCK_USER_EMAIL}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${BACKEND_PORT}:3000"

volumes:
  postgres_data:
