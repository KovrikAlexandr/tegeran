services:
  postgres:
    image: postgres:16-alpine
    container_name: tegeran-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: postgres
      MESSENGER_DB_NAME: ${MESSENGER_DB_NAME}
      MESSENGER_DB_USER: ${MESSENGER_DB_USER}
      MESSENGER_DB_PASSWORD: ${MESSENGER_DB_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: tegeran-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${MESSENGER_DB_USER}:${MESSENGER_DB_PASSWORD}@postgres:5432/${MESSENGER_DB_NAME}?schema=public
      PORT: 3000
      AUTH_ENABLED: ${AUTH_ENABLED}
      LOG_LEVEL: ${LOG_LEVEL}
      MOCK_AUTH_SUBJECT: ${MOCK_AUTH_SUBJECT}
      MOCK_USER_NAME: ${MOCK_USER_NAME}
      MOCK_USER_EMAIL: ${MOCK_USER_EMAIL}
    ports:
      - "${BACKEND_PORT}:3000"

volumes:
  postgres_data:
